name: Build

on:
  push:
    branches: [main, master, v2-http-direct]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "sdk.dir=$ANDROID_HOME" > obsidian-quick-capture/local.properties
          cd obsidian-quick-capture
          chmod +x gradlew
          ./gradlew assembleDebug
          echo "=== APK files ==="
          find . -name "*.apk" -type f

      - uses: actions/upload-artifact@v4
        with:
          name: quick-capture-apk
          path: obsidian-quick-capture/**/*.apk

  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd obsidian-local-sync && npm ci && npm run build
      - run: cd obsidian-local-sync && zip -r obsidian-local-inbox-sync.zip main.js manifest.json styles.css
      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: obsidian-local-sync/obsidian-local-inbox-sync.zip
