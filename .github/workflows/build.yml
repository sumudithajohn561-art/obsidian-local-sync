name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          # 列出可用的 SDK 组件
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools"
          # 如果需要，安装 SDK 34
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || echo "sdkmanager not available (will use Gradle auto-download)"
          echo "sdk.dir=$ANDROID_HOME" > obsidian-quick-capture/local.properties
          cd obsidian-quick-capture
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tail -50

      - uses: actions/upload-artifact@v4
        with:
          name: quick-capture-apk
          path: obsidian-quick-capture/app/build/outputs/apk/debug/app-debug.apk

  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd obsidian-local-sync && npm ci && npm run build
      - run: cd obsidian-local-sync && zip -r obsidian-local-inbox-sync.zip main.js manifest.json styles.css
      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: obsidian-local-sync/obsidian-local-inbox-sync.zip
