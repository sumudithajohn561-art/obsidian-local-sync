name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > obsidian-quick-capture/local.properties
          cd obsidian-quick-capture
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: quick-capture-debug
          path: obsidian-quick-capture/app/build/outputs/apk/debug/app-debug.apk

  build-plugin:
    name: Build Obsidian Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd obsidian-local-sync && npm ci && npm run build
      - run: cd obsidian-local-sync && zip -r obsidian-local-inbox-sync.zip main.js manifest.json styles.css
      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: obsidian-local-sync/obsidian-local-inbox-sync.zip
