name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ============ Android APK 构建 ============
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "no platforms dir"
          ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "no build-tools dir"
          # 安装 SDK 34
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_SDK_ROOT
          echo "Installed SDK components:"
          ls $ANDROID_SDK_ROOT/platforms/
          ls $ANDROID_SDK_ROOT/build-tools/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          cd obsidian-quick-capture
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quick-capture-debug
          path: obsidian-quick-capture/app/build/outputs/apk/debug/app-debug.apk

  # ============ Obsidian 插件构建 ============
  build-plugin:
    name: Build Obsidian Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          cd obsidian-local-sync
          npm ci

      - name: Build Plugin
        run: |
          cd obsidian-local-sync
          npm run build

      - name: Package Plugin
        run: |
          cd obsidian-local-sync
          zip -r obsidian-local-inbox-sync.zip main.js manifest.json styles.css

      - name: Upload Plugin
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: obsidian-local-sync/obsidian-local-inbox-sync.zip

  # ============ Release (仅 tag 推送时触发) ============
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: quick-capture-debug
          path: ./release

      - uses: actions/download-artifact@v4
        with:
          name: obsidian-plugin
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/app-debug.apk
            ./release/obsidian-local-inbox-sync.zip
          generate_release_notes: true
